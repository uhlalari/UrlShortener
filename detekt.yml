build:
  maxIssues: 0
  excludeCorrectable: false
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false
  checkExhaustiveness: false

processors:
  active: true

console:
  reports:
    active: false

output:
  format: plain
  maxIssues: 0
  reports:
    txt:
      enabled: true
      destination: build/reports/detekt/detekt.txt
    html:
      enabled: true
      destination: build/reports/detekt/detekt.html
    xml:
      enabled: true
      destination: build/reports/detekt/detekt.xml

comments:
  active: false

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    threshold: 6

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

naming:
  active: true

performance:
  active: true

potential-bugs:
  active: true

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 120
